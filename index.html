    async function loadData(){
      try{
        // If running from file://, fetch may be blocked; attempt fetch then fallback
        const res = await fetch('./data/dashboard.json');
        if(!res.ok) throw new Error('Veri bulunamadı: ' + res.status);
        const data = await res.json();
        render(data);
      }catch(e){
        document.getElementById('status').textContent = 'Hata: ' + e.message + ' — gömülü veri kullanılıyor';
        render(window.__EMBEDDED_DATA__);
      }
    }

    function render(data){
      document.getElementById('status').textContent = '';
      if(!Array.isArray(data) && data.entries) data = data.entries;
      if(!Array.isArray(data)){
        document.getElementById('content').textContent = JSON.stringify(data, null, 2);
        return;
      }
      if(data.length === 0){ document.getElementById('content').textContent = 'Kayıt yok'; return; }

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      const keys = Object.keys(data[0]);
      keys.forEach(k => { const th = document.createElement('th'); th.textContent = k; headerRow.appendChild(th); });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      data.forEach(row => {
        const tr = document.createElement('tr');
        keys.forEach(k => {
          const td = document.createElement('td');
          let v = row[k];
          if(typeof v === 'object') v = JSON.stringify(v);
          td.textContent = v === undefined ? '' : v;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      const container = document.getElementById('content');
      container.innerHTML = '';
      container.appendChild(table);
    }

    loadData();
  </script>
