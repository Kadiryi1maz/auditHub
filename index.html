<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AuditHub - Static Viewer</title>
  <link rel="stylesheet" href="./wwwroot/css/style.css">
  <style>
    body { font-family: Arial, Helvetica, sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f4f4f4; }
  </style>
</head>
<body>
  <h1>AuditHub - Static Viewer</h1>
  <p>Bu statik versiyon, sunucu tarafı olmadan `data/dashboard.json` içeriğini gösterir.</p>

  <div id="status">Yükleniyor…</div>
  <div id="content"></div>

  <script>
    async function loadData(){
      try{
        const res = await fetch('./data/dashboard.json');
        if(!res.ok) throw new Error('Veri bulunamadı: ' + res.status);
        const data = await res.json();
        render(data);
      }catch(e){
        document.getElementById('status').textContent = 'Hata: ' + e.message;
      }
    }

    function render(data){
      document.getElementById('status').textContent = '';
      if(!Array.isArray(data) && data.entries) data = data.entries;
      if(!Array.isArray(data)){
        document.getElementById('content').textContent = JSON.stringify(data, null, 2);
        return;
      }
      if(data.length === 0){ document.getElementById('content').textContent = 'Kayıt yok'; return; }

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      const keys = Object.keys(data[0]);
      keys.forEach(k => { const th = document.createElement('th'); th.textContent = k; headerRow.appendChild(th); });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      data.forEach(row => {
        const tr = document.createElement('tr');
        keys.forEach(k => {
          const td = document.createElement('td');
          let v = row[k];
          if(typeof v === 'object') v = JSON.stringify(v);
          td.textContent = v === undefined ? '' : v;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      const container = document.getElementById('content');
      container.innerHTML = '';
      container.appendChild(table);
    }

    loadData();
  </script>
</body>
</html>
